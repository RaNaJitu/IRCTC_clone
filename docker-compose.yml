version: "3.9"
name: "IRCTC-Backend"

services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: IRCTC-DB
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dmin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"
    depends_on:
      - postgres

  redis:
    image: redis/redis-stack:6.2.6-v19
    container_name: redis_insider
    restart: always
    environment:
      REDIS_ARGS: "--requirepass irctcpass"
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data



  # user-service:
  #   build: .
  #   container_name: user-service
  #   depends_on:
  #     - postgres
  #   ports:
  #     - "3000:3000"
  #   env_file:
  #     - .env

volumes:
  postgres_data:
  redis_data: